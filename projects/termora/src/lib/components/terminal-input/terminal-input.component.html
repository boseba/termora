<div class="input">
  <span>#</span>

  <div>
    <input #inputCommand type="text" [value]="state().inputValue" spellcheck="false" autocomplete="off"
      (input)="onInput($event)" (keydown)="onKeyDown($event)" />

    <div class="layer highlight" [innerHTML]="improvedInput()"></div>
  </div>
</div>
