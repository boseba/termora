name: Publish to NPM

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: write
    id-token: write

jobs:
    validate:
        name: Lint, Test Coverage and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run lint
              run: pnpm run lint

            - name: Run tests with coverage
              run: pnpm run test:coverage

            - name: Build package
              run: pnpm run build

    dry-run:
        name: Dry Run Publish
        runs-on: ubuntu-latest
        needs: validate

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: 'https://registry.npmjs.org/'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build package
              run: pnpm run build

            - name: Publish dry run
              working-directory: dist/termora
              run: pnpm publish --dry-run --access public --provenance --no-git-checks

    publish:
        name: Publish to NPM
        runs-on: ubuntu-latest
        needs: dry-run
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: 'https://registry.npmjs.org/'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build package
              run: pnpm run build

            - name: Publish to npm
              working-directory: dist/termora
              run: pnpm publish --access public --provenance --no-git-checks

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: publish

        steps:
            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true